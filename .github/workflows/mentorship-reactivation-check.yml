name: Mentorship Reactivation Check

on:
  # Daily at 08:00 UTC — before the inactivity warning job at 09:00
  schedule:
    - cron: '0 8 * * *'

  # Manual trigger — defaults to dry-run for safety
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'dry-run'
        type: choice
        options:
          - dry-run
          - execute

jobs:
  reactivation-check:
    name: Reactivate mentorships with new Discord activity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check for reactivatable mentorships
        env:
          NODE_ENV: production
          # On schedule: always dry-run. On manual dispatch: respect mode input.
          DRY_RUN: ${{ github.event_name == 'schedule' || github.event.inputs.mode == 'dry-run' }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: npx tsx scripts/mentorship-reactivation-check.ts
