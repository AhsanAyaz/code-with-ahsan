name: Notify Project Collaboration Channel

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        default: 'list'
        type: choice
        options:
          - list
          - notify

jobs:
  # Job 1: List active projects with open spots (read-only, safe)
  list:
    name: List open projects
    runs-on: ubuntu-latest
    if: github.event.inputs.job == 'list'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: List open projects
        env:
          NODE_ENV: production
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          MODE: list
        run: npx tsx scripts/notify-project-collaboration.ts

  # Job 2: Send Discord notifications for all open projects (manual trigger only)
  notify:
    name: Notify #project-collaboration for all open projects
    runs-on: ubuntu-latest
    if: github.event.inputs.job == 'notify'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Send Discord notifications
        env:
          NODE_ENV: production
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
          MODE: notify
        run: npx tsx scripts/notify-project-collaboration.ts
